volumes:
  ckan_storage:
  pg_data:
  solr_data:

networks:
  webnet:
  ckannet:
    internal: true
  solrnet:
    internal: true
  dbnet:
    internal: true
  redisnet:
    internal: true

x-common-ckan:
  &default-common-ckan
  build:
    context: .
    dockerfile: Dockerfile
  image: ghcr.io/gisdevio/catalogue-tools4msp:2.11
  env_file: .env
  depends_on:
    db:
      condition: service_healthy
    solr:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - webnet
    - ckannet
    - solrnet
    - dbnet
    - redisnet
  environment:
    &default-common-env-ckan
    # Database
    CKAN_SQLALCHEMY_URL: postgresql://ckan:${POSTGRES_PASSWORD:-ckan}@db/ckan
    CKAN_DATASTORE_WRITE_URL: postgresql://ckan:${POSTGRES_PASSWORD:-ckan}@db/datastore
    CKAN_DATASTORE_READ_URL: postgresql://datastore_ro:${DS_RO_PASS:-datastore}@db/datastore
    # Search
    CKAN_SOLR_URL: http://solr:8983/solr/ckan
    # Redis
    CKAN_REDIS_URL: redis://redis:6379/1
    # Xloader
    CKANEXT__XLOADER__JOBS_DB__URI: postgresql://ckan:ckan@db/datastore
    # Core settings
    CKAN_SITE_URL: http://localhost:5000
    CKAN_MAX_UPLOAD_SIZE_MB: 1000
    # Custom settings
    DOMAINAREAS_URL: "https://api.tools4msp.eu/api/v2/domainareas/?format=json"
    CKAN_SMTP_SERVER: "email.ismar.cnr.it"
    CKAN_SMTP_STARTTLS: false
    CKAN_SMTP_MAIL_FROM: "catalogue4msp@ismar.cnr.it"
    # Branding configuration
    CKAN__BRANDING__FEATURED_CATEGORIES: "[]"
    CKAN__BRANDING__FEATURED_DATASETS: "[]"
    CKAN__BRANDING__FEATURED_GROUPS: "[]"
  volumes:
    - ckan_storage:/var/lib/ckan

services:
  ckan:
    << : *default-common-ckan
    profiles:
      - prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:5000"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5000:5000"

  ckan-dev:
    << : *default-common-ckan
    profiles:
      - dev
    hostname: ckan
    ports:
      - "5000:5000"
    command: 'ckan run --host 0.0.0.0 --passthrough-errors'
    entrypoint: ["/bin/bash", "/dev-entrypoint.sh"]
    tty: true
    stdin_open: true
    user: root
    volumes:
      - ckan_storage:/var/lib/ckan
      # Extensions
      - ./ckanext/ckanext-branding:/usr/lib/ckan/ckanext/ckanext-branding:z
      - ./ckanext/ckanext-schemas:/usr/lib/ckan/ckanext/ckanext-schemas:z

  db:
    image: docker.io/library/postgres:18-alpine
    networks:
      - dbnet
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ckan}
      POSTGRES_DB: postgres
      DS_RO_PASS: ${DS_RO_PASS:-datastore}
      PGDATA: /var/lib/postgresql/data/db
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  solr:
    image: docker.io/ckan/ckan-solr:2.11-solr9
    networks:
      - solrnet
    volumes:
      - solr_data:/var/solr
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8983/solr/"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:6.2-alpine
    networks:
      - redisnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-e", "QUIT"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    << : *default-common-ckan
    command: 'ckan jobs worker'
    profiles:
      - prod
    networks:
      - ckannet
      - dbnet
      - redisnet
    restart: unless-stopped

  worker-dev:
    << : *default-common-ckan
    command: 'ckan jobs worker'
    profiles:
      - dev
    networks:
      - ckannet
      - dbnet
      - redisnet
    volumes:
      - ckan_storage:/var/lib/ckan
      # Extensions
      - ./ckanext/ckanext-branding:/usr/lib/ckan/ckanext/ckanext-branding:z
      - ./ckanext/ckanext-schemas:/usr/lib/ckan/ckanext/ckanext-schemas:z
    restart: unless-stopped
